{% extends "base.html" %}

{% block content %}

<h2 class="text-2xl font-bold mb-6">Create New Account</h2>

<div class="bg-white p-6 rounded-xl shadow w-96">
    <form method="POST">
        {% csrf_token %}

        <label class="text-sm text-gray-600">Account Number</label>
        <input type="text" name="account_number" placeholder="e.g. 1234567890"
            class="border p-2 rounded w-full mb-3 mt-1" required>

        <label class="text-sm text-gray-600">Account Type</label>
        <select name="account_type" class="border p-2 rounded w-full mb-3 mt-1">
            <option value="savings">Savings</option>
            <option value="current">Current</option>
        </select>

        <label class="text-sm text-gray-600">Initial Balance (₹)</label>
        <input type="number" name="balance" placeholder="0.00"
            class="border p-2 rounded w-full mb-3 mt-1" min="0" step="0.01" required>

        <label class="text-sm text-gray-600">Customer</label>
        <select name="customer" class="border p-2 rounded w-full mb-3 mt-1">
            {% for c in customers %}
                <option value="{{ c.id }}">{{ c }}</option>
            {% empty %}
                <option disabled>No customers found — add via admin</option>
            {% endfor %}
        </select>

        <label class="text-sm text-gray-600">Branch</label>
        <select name="branch" class="border p-2 rounded w-full mb-4 mt-1">
            {% for b in branches %}
                <option value="{{ b.id }}">{{ b }}</option>
            {% empty %}
                <option disabled>No branches found — add via admin</option>
            {% endfor %}
        </select>

        <button class="bg-indigo-600 text-white px-4 py-2 rounded w-full hover:bg-indigo-700">
            Create Account
        </button>

    </form>
</div>

{% endblock %}
