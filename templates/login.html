<!DOCTYPE html>
<html>
<head>
    <title>Bank Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-indigo-900 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow w-80">

    <h2 class="text-2xl font-bold mb-2 text-center text-indigo-900">🏦 Bank System</h2>
    <p class="text-center text-gray-500 text-sm mb-6">Sign in to your account</p>

    {% if error %}
    <div class="bg-red-100 text-red-600 text-sm p-2 rounded mb-4">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label class="text-sm text-gray-600">Username</label>
        <input type="text" name="username" placeholder="Enter username"
            class="border p-2 rounded w-full mb-3 mt-1" required>

        <label class="text-sm text-gray-600">Password</label>
        <input type="password" name="password" placeholder="Enter password"
            class="border p-2 rounded w-full mb-5 mt-1" required>

        <button class="bg-indigo-600 text-white w-full py-2 rounded hover:bg-indigo-700 font-medium">
            Login
        </button>
    </form>

</div>

</body>
</html>
