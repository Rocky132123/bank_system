<!DOCTYPE html>
<html>
<head>
    <title>Bank System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
<div class="flex">

    <!-- Sidebar -->
    <div class="w-64 h-screen bg-indigo-900 text-white p-6 fixed">
        <h2 class="text-2xl font-bold mb-8">🏦 Bank</h2>
        <nav class="space-y-4">
            <a href="/dashboard/"    class="block hover:text-indigo-300">📊 Dashboard</a>
            <a href="/accounts/"     class="block hover:text-indigo-300">🏦 Accounts</a>
            <a href="/transfer/"     class="block hover:text-indigo-300">🔁 Transfer</a>
            <a href="/deposit/"      class="block hover:text-indigo-300">💰 Deposit</a>
            <a href="/withdraw/"     class="block hover:text-indigo-300">💸 Withdraw</a>
            <a href="/transactions/" class="block hover:text-indigo-300">📋 Transactions</a>
            <a href="/loans/"        class="block hover:text-indigo-300">🏠 Loans</a>
            <a href="/audit/"        class="block hover:text-indigo-300">🔍 Audit Logs</a>
        </nav>
    </div>

    <!-- Main content -->
    <div class="ml-64 w-full">

        <!-- Top bar -->
        <div class="bg-white shadow p-4 flex justify-between items-center">
            <h3 class="font-bold text-indigo-900">Bank System</h3>
            <div class="flex items-center gap-4">
                <span class="text-gray-700 font-medium">👤 {{ request.user.username }}</span>
                <a href="/logout/" class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600 text-sm">Logout</a>
            </div>
        </div>

        <!-- Page content -->
        <div class="p-6">
            {% block content %}{% endblock %}
        </div>

    </div>
</div>
</body>
</html>
