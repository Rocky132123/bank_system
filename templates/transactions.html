{% extends "base.html" %}

{% block content %}

<h2 class="text-2xl font-bold mb-6">Transactions</h2>

<div class="bg-white rounded-xl shadow p-4">
    <table class="w-full text-sm">
        <thead class="border-b">
            <tr class="text-left text-gray-500">
                <th class="p-2">Account</th>
                <th class="p-2">Type</th>
                <th class="p-2">Amount</th>
                <th class="p-2">Date</th>
            </tr>
        </thead>
        <tbody>
            {% for t in transactions %}
            <tr class="border-b hover:bg-gray-50">
                <td class="p-2">{{ t.account }}</td>
                <td class="p-2 capitalize">{{ t.transaction_type }}</td>
                <td class="p-2">₹ {{ t.amount }}</td>
                <td class="p-2">{{ t.created_at|date:"d M Y, H:i" }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="p-4 text-center text-gray-400">No transactions yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
